name: Advanced Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: false
      rollback:
        description: 'Rollback to previous version'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production (Zero-Downtime)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.rollback }}" == "true" ]; then
              echo "version=rollback" >> $GITHUB_OUTPUT
              echo "deploy_type=rollback" >> $GITHUB_OUTPUT
            elif [ -n "${{ github.event.inputs.version }}" ]; then
              echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
              echo "deploy_type=manual" >> $GITHUB_OUTPUT
            else
              echo "version=main" >> $GITHUB_OUTPUT
              echo "deploy_type=manual" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "deploy_type=tag" >> $GITHUB_OUTPUT
          else
            COMMIT_SHORT=$(git rev-parse --short HEAD)
            echo "version=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
            echo "deploy_type=branch" >> $GITHUB_OUTPUT
          fi
          echo "📦 Deploying version: $(cat $GITHUB_OUTPUT | grep version | cut -d'=' -f2)"
          echo "📋 Deploy type: $(cat $GITHUB_OUTPUT | grep deploy_type | cut -d'=' -f2)"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # Test SSH connection
          echo "🔍 Testing SSH connection..."
          ssh -o BatchMode=yes -o ConnectTimeout=5 ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "echo 'SSH connection successful'" || {
            echo "⚠️ SSH connection test failed"
            exit 1
          }

      - name: Create zero-downtime deployment script
        run: |
          cat > /tmp/deploy-zero-downtime.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e
          
          DEPLOY_PATH="${DEPLOY_PATH}"
          VERSION="${DEPLOY_VERSION}"
          DEPLOY_TYPE="${DEPLOY_TYPE}"
          
          echo "🚀 Starting zero-downtime deployment..."
          echo "📍 Path: ${DEPLOY_PATH}"
          echo "🏷️  Version: ${VERSION}"
          echo "📋 Type: ${DEPLOY_TYPE}"
          
          cd "${DEPLOY_PATH}"
          
          # Verify directory
          if [ ! -f "docker-compose.yml" ]; then
            echo "❌ Error: docker-compose.yml not found"
            exit 1
          fi
          
          # Ensure GitHub host key is in known_hosts for deployer user
          echo "🔐 Configuring GitHub SSH access..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ! grep -q "github.com" ~/.ssh/known_hosts 2>/dev/null; then
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          fi
          chmod 600 ~/.ssh/known_hosts 2>/dev/null || true
          
          # Detect Docker Compose command
          if command -v docker &> /dev/null && docker compose version &> /dev/null 2>&1; then
            DOCKER_COMPOSE="docker compose"
          elif command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE="docker-compose"
          else
            echo "❌ Docker Compose not found!"
            exit 1
          fi
          
          # Function to check service health
          check_health() {
            local service=$1
            local port=$2
            local max_attempts=30
            local attempt=1
            
            echo "🏥 Checking health of ${service} on port ${port}..."
            while [ $attempt -le $max_attempts ]; do
              if curl -f http://localhost:${port}/health &> /dev/null 2>&1 || curl -f http://localhost:${port} &> /dev/null 2>&1; then
                echo "✅ ${service} is healthy"
                return 0
              fi
              echo "⏳ Attempt ${attempt}/${max_attempts}: ${service} not ready yet..."
              sleep 2
              attempt=$((attempt + 1))
            done
            
            echo "❌ ${service} failed health check after ${max_attempts} attempts"
            return 1
          }
          
          # Function to save current state for rollback
          save_state() {
            echo "💾 Saving current state for potential rollback..."
            mkdir -p "${DEPLOY_PATH}/.deploy-backup"
            $DOCKER_COMPOSE ps --format json > "${DEPLOY_PATH}/.deploy-backup/last-state.json" 2>/dev/null || true
            git rev-parse HEAD > "${DEPLOY_PATH}/.deploy-backup/last-commit.txt" 2>/dev/null || true
            echo "${VERSION}" > "${DEPLOY_PATH}/.deploy-backup/last-version.txt"
          }
          
          # Function to rollback
          rollback() {
            echo "🔄 Rolling back to previous version..."
            if [ -f "${DEPLOY_PATH}/.deploy-backup/last-commit.txt" ]; then
              LAST_COMMIT=$(cat "${DEPLOY_PATH}/.deploy-backup/last-commit.txt")
              echo "📌 Rolling back to commit: ${LAST_COMMIT}"
              git fetch origin
              git reset --hard "${LAST_COMMIT}"
              
              # Restart with previous code
              $DOCKER_COMPOSE build --no-cache
              $DOCKER_COMPOSE up -d
              
              sleep 10
              check_health "backend" "8000" && check_health "frontend" "3000"
              echo "✅ Rollback completed"
            else
              echo "❌ No backup found for rollback"
              exit 1
            fi
          }
          
          # Handle rollback request
          if [ "${DEPLOY_TYPE}" = "rollback" ]; then
            rollback
            exit 0
          fi
          
          # Save current state before deployment
          save_state
          
          # Pull latest changes
          echo "📥 Pulling latest changes..."
          git fetch origin
          
          if [ "${DEPLOY_TYPE}" = "tag" ]; then
            git checkout "${VERSION}"
          elif [ "${DEPLOY_TYPE}" = "manual" ] && [ "${VERSION}" != "main" ] && [ "${VERSION}" != "rollback" ]; then
            git checkout "${VERSION}"
          else
            git reset --hard origin/main
          fi
          
          # Build new images with version tag
          echo "🔨 Building Docker images..."
          export IMAGE_VERSION="${VERSION}"
          $DOCKER_COMPOSE build --no-cache
          
          # Start new containers with different names (blue-green strategy)
          echo "🚀 Starting new containers..."
          
          # For zero-downtime, we'll use a different approach:
          # 1. Build new images
          # 2. Start new containers with temporary names
          # 3. Health check new containers
          # 4. If healthy, stop old containers and rename new ones
          # 5. If unhealthy, stop new containers and keep old ones running
          
          # Create backup compose file with version suffix
          COMPOSE_BACKUP="${DEPLOY_PATH}/docker-compose.backup.yml"
          cp "${DEPLOY_PATH}/docker-compose.yml" "${COMPOSE_BACKUP}"
          
          # Clean up containers with conflicting names
          echo "🧹 Cleaning up containers with conflicting names..."
          
          # First, stop and remove containers managed by docker compose
          echo "   - Stopping existing compose containers..."
          $DOCKER_COMPOSE down --remove-orphans 2>/dev/null || true
          
          # Remove ALL containers (running or stopped) with binary-system in name
          echo "   - Removing all binary-system containers..."
          docker ps -a --filter "name=binary-system-backend" -q | while read -r cid; do
            [ -n "$cid" ] && docker stop "$cid" 2>/dev/null || true
            [ -n "$cid" ] && docker rm -f "$cid" 2>/dev/null || true
          done || true
          
          docker ps -a --filter "name=binary-system-frontend" -q | while read -r cid; do
            [ -n "$cid" ] && docker stop "$cid" 2>/dev/null || true
            [ -n "$cid" ] && docker rm -f "$cid" 2>/dev/null || true
          done || true
          
          # Remove containers with ID prefixes in names (Docker Compose legacy naming issue)
          echo "   - Removing containers with ID prefixes..."
          docker ps -a --format "{{.Names}} {{.ID}}" 2>/dev/null | grep -E "[0-9a-f]{12}_binary-system" | awk '{print $2}' | while read -r cid; do
            [ -n "$cid" ] && docker stop "$cid" 2>/dev/null || true
            [ -n "$cid" ] && docker rm -f "$cid" 2>/dev/null || true
          done || true
          
          # Also check for containers with the exact pattern from the error
          docker ps -a --format "{{.Names}} {{.ID}}" 2>/dev/null | grep -E ".*_binary-system-(backend|frontend)" | awk '{print $2}' | while read -r cid; do
            [ -n "$cid" ] && docker stop "$cid" 2>/dev/null || true
            [ -n "$cid" ] && docker rm -f "$cid" 2>/dev/null || true
          done || true
          
          # Final cleanup: remove any orphaned containers
          echo "   - Cleaning up orphaned containers..."
          docker container prune -f 2>/dev/null || true
          
          # Start new containers with --remove-orphans to clean up conflicts
          $DOCKER_COMPOSE up -d --force-recreate --remove-orphans backend frontend
          
          # Wait and check health of new containers
          echo "⏳ Waiting for new containers to start..."
          sleep 15
          
          if check_health "backend" "8000" && check_health "frontend" "3000"; then
            echo "✅ New containers are healthy, deployment successful!"
            
            # Remove old stopped containers
            docker container prune -f
            
            # Clean up backup
            rm -f "${COMPOSE_BACKUP}"
            
            # Show container status
            echo "📊 Final container status:"
            $DOCKER_COMPOSE ps
            
            # Clean up old images
            echo "🧹 Cleaning up unused Docker resources..."
            docker image prune -f || true
            
            echo "✅ Zero-downtime deployment complete!"
          else
            echo "❌ New containers failed health checks, rolling back..."
            
            # Stop new containers
            $DOCKER_COMPOSE down
            
            # Restore previous containers
            if [ -f "${COMPOSE_BACKUP}" ]; then
              # Try to start previous containers if they exist
              $DOCKER_COMPOSE -f "${COMPOSE_BACKUP}" up -d 2>/dev/null || true
            fi
            
            # Attempt rollback
            rollback || {
              echo "❌ Rollback failed. Manual intervention required."
              exit 1
            }
          fi
          DEPLOY_SCRIPT
          chmod +x /tmp/deploy-zero-downtime.sh

      - name: Deploy to server (Zero-Downtime)
        env:
          DEPLOY_PATH: ${{ secrets.PROD_PATH }}
          DEPLOY_VERSION: ${{ steps.version.outputs.version }}
          DEPLOY_TYPE: ${{ steps.version.outputs.deploy_type }}
        run: |
          echo "📤 Copying deployment script to server..."
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            /tmp/deploy-zero-downtime.sh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:~/deploy-zero-downtime.sh
          
          echo "🚀 Executing zero-downtime deployment on server..."
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "chmod +x ~/deploy-zero-downtime.sh && DEPLOY_PATH='${{ secrets.PROD_PATH }}' DEPLOY_VERSION='${{ steps.version.outputs.version }}' DEPLOY_TYPE='${{ steps.version.outputs.deploy_type }}' bash ~/deploy-zero-downtime.sh"

      - name: Verify deployment
        run: |
          echo "✅ Deployment workflow completed successfully"
          echo "🌐 Application should be accessible at:"
          echo "   Frontend: http://${{ secrets.PROD_HOST }}:3000"
          echo "   Backend:  http://${{ secrets.PROD_HOST }}:8000"
          echo "🏷️  Deployed version: ${{ steps.version.outputs.version }}"
