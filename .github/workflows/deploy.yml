name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production Server
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git commands

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # Test SSH connection
          echo "🔍 Testing SSH connection..."
          ssh -v -o BatchMode=yes -o ConnectTimeout=5 ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "echo 'SSH connection successful'" || {
            echo "⚠️ SSH connection test failed. Please verify:"
            echo "1. PROD_SSH_KEY contains the complete private key (including headers)"
            echo "2. The corresponding public key is in ~/.ssh/authorized_keys on the server"
            echo "3. PROD_USER, PROD_HOST, and PROD_PATH are correct"
            exit 1
          }

      - name: Create deployment script
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e
          
          echo "🚀 Starting deployment..."
          
          # Navigate to application directory
          cd "${DEPLOY_PATH}"
          
          # Verify we're in the right directory
          if [ ! -f "docker-compose.yml" ]; then
            echo "❌ Error: docker-compose.yml not found in ${DEPLOY_PATH}"
            exit 1
          fi
          
          # Pull latest changes
          echo "📥 Pulling latest changes from repository..."
          git fetch origin
          git reset --hard origin/main
          
          # Detect Docker Compose command
          if command -v docker &> /dev/null && docker compose version &> /dev/null 2>&1; then
            DOCKER_COMPOSE="docker compose"
            echo "✅ Using Docker Compose v2"
          elif command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE="docker-compose"
            echo "⚠️  Using Docker Compose v1 (legacy)"
          else
            echo "❌ Docker Compose not found!"
            exit 1
          fi
          
          # Stop existing containers gracefully
          echo "🛑 Stopping existing containers..."
          $DOCKER_COMPOSE down || true
          
          # Build new images
          echo "🔨 Building Docker images..."
          $DOCKER_COMPOSE build --no-cache
          
          # Start containers
          echo "🚀 Starting containers..."
          $DOCKER_COMPOSE up -d
          
          # Wait for services to be ready
          echo "⏳ Waiting for services to start..."
          sleep 10
          
          # Check container status
          echo "📊 Container Status:"
          $DOCKER_COMPOSE ps
          
          # Health checks
          echo "🏥 Running health checks..."
          
          # Backend health check
          if curl -f http://localhost:8000/health &> /dev/null; then
            echo "✅ Backend is healthy"
          else
            echo "⚠️  Backend health check failed (may still be starting)"
          fi
          
          # Frontend health check
          if curl -f http://localhost:3000 &> /dev/null; then
            echo "✅ Frontend is responding"
          else
            echo "⚠️  Frontend health check failed (may still be starting)"
          fi
          
          # Clean up old Docker images (optional - remove if you want to keep images)
          echo "🧹 Cleaning up unused Docker resources..."
          docker image prune -f || true
          
          echo "✅ Deployment complete!"
          DEPLOY_SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ secrets.PROD_PATH }}
        run: |
          echo "📤 Copying deployment script to server..."
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            /tmp/deploy.sh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/deploy.sh
          
          echo "🚀 Executing deployment on server..."
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "DEPLOY_PATH='${{ secrets.PROD_PATH }}' bash /tmp/deploy.sh"

      - name: Verify deployment
        run: |
          echo "✅ Deployment workflow completed successfully"
          echo "🌐 Application should be accessible at:"
          echo "   Frontend: http://${{ secrets.PROD_HOST }}:3000"
          echo "   Backend:  http://${{ secrets.PROD_HOST }}:8000"
