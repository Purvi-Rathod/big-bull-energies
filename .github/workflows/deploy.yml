name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Run deploy on server (background)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_PATH }} && nohup bash scripts/deploy-master.sh >> /tmp/deploy-master.log 2>&1 &"
          echo "Deploy started in background on server. Check /tmp/deploy-master.log on server for output."
