# Remove version line for newer Docker Compose (already removed)
services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: binary-system-backend
    ports:
      - "8000:8000"
    # SECURITY HARDENING: Read-only root filesystem, drop capabilities, no new privileges
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required to bind to port 8000
    tmpfs:
      - /tmp:noexec,nosuid,size=100m  # Temporary filesystem with security restrictions
      - /usr/src/app/logs:noexec,nosuid,size=50m  # Logs directory
      - /usr/src/app/tmp:noexec,nosuid,size=50m  # Temp directory
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-8000}
      - MONGODB_URL_DEVELOPMENT=${MONGODB_URL_DEVELOPMENT}
      - MONGODB_URL_PRODUCTION=${MONGODB_URL_PRODUCTION}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-${CLIENT_URL:-http://localhost:3000}}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_JWT_EXPIRES_IN=${ADMIN_JWT_EXPIRES_IN}
      - NOWPAYMENTS_API_KEY=${NOWPAYMENTS_API_KEY}
      - NOWPAYMENTS_API_URL=${NOWPAYMENTS_API_URL}
      - NOWPAYMENTS_CALLBACK_URL=${NOWPAYMENTS_CALLBACK_URL}
      - NOWPAYMENTS_IPN_SECRET=${NOWPAYMENTS_IPN_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - API_URL=${API_URL:-https://api.crownbankers.com}
    restart: unless-stopped
    networks:
      - binary-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.crownbankers.com}/api/v1
    container_name: binary-system-frontend
    ports:
      - "3000:3000"
    # SECURITY HARDENING: Drop capabilities, no new privileges
    # Note: read_only disabled for frontend as Next.js standalone needs write access to .next
    # Security maintained through: non-root user, dropped capabilities, minimal permissions
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required to bind to port 3000
    tmpfs:
      - /tmp:noexec,nosuid,size=100m  # Temporary filesystem with security restrictions
    # Allow writes to .next directory for Next.js runtime (required for standalone mode)
    volumes:
      - frontend-next-cache:/app/.next:rw
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.crownbankers.com}/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - binary-network

networks:
  binary-network:
    driver: bridge

volumes:
  frontend-next-cache:
