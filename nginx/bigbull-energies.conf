# Big Bull Energies — Nginx reverse proxy
#
# Layout:
#   Frontend (Next.js) -> localhost:3000
#   Backend  (API)     -> localhost:5000
#
# Install:
#   sudo cp nginx/bigbull-energies.conf /etc/nginx/sites-available/bigbull-energies
#   sudo ln -s /etc/nginx/sites-available/bigbull-energies /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# With a domain later, replace server_name and run:
#   sudo certbot --nginx -d bigbullenergies.com -d api.bigbullenergies.com

# -------------------------------------------------
# API — http://104.219.250.57  (or api.yourdomain.com)
# Full login URL: http://104.219.250.57/api/v1/auth/login
# Admin login:    http://104.219.250.57/api/v1/admin/login
# -------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 104.219.250.57 api.bigbullenergies.com;

    client_max_body_size 15M;

    # Health check
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment webhook (NOWPayments IPN) — no buffering
    location /api/v1/payment/callback {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }

    # All API routes
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    # Direct API host: proxy everything to backend
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }
}

# -------------------------------------------------
# Frontend — http://104.219.250.57:80 via separate host
# If using one IP for both, use path or subdomain below.
# Recommended: frontend on main host, API on /api or subdomain.
# -------------------------------------------------
server {
    listen 8080;
    listen [::]:8080;
    server_name 104.219.250.57 bigbullenergies.com www.bigbullenergies.com;

    client_max_body_size 15M;

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }

    # Optional: serve API under same origin at /api/
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }
}
