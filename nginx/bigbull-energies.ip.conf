# Big Bull Energies — Single-server nginx (recommended for IP deploy)
#
# Frontend: http://104.219.250.57        -> Next.js :3000
# API:      http://104.219.250.57/api/... -> Backend :5000
#
# Login URLs after nginx:
#   User:  POST http://104.219.250.57/api/v1/auth/login
#   Admin: POST http://104.219.250.57/api/v1/admin/login
#
# Install:
#   sudo cp nginx/bigbull-energies.ip.conf /etc/nginx/sites-available/bigbull-energies
#   sudo ln -sf /etc/nginx/sites-available/bigbull-energies /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Client .env (production build):
#   NEXT_PUBLIC_API_URL=http://104.219.250.57/api/v1
#
# Server .env:
#   CLIENT_URL=http://104.219.250.57
#   FRONTEND_URL=http://104.219.250.57
#   ALLOWED_ORIGINS=http://104.219.250.57
#   BASE_URL=http://104.219.250.57
#   PORT=5000

upstream bigbull_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream bigbull_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 104.219.250.57 _;

    client_max_body_size 15M;

    # ---------- API ----------
    location /api/ {
        proxy_pass http://bigbull_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_set_header Connection "";

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    # Payment IPN webhook
    location = /api/v1/payment/callback {
        proxy_pass http://bigbull_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Health
    location = /api/v1/health {
        proxy_pass http://bigbull_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---------- Frontend (Next.js) ----------
    location / {
        proxy_pass http://bigbull_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
